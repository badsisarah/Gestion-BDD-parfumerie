<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Insertion Stock</title>
    <style>
        body {
            font-family: 'Segoe UI', sans-serif;
            background: linear-gradient(to right, #ffe4ec, #f8d7dd);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .container {
            background-color: white;
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.2);
            width: 100%;
            max-width: 400px;
        }
        h1 {
            font-weight: bold;
            text-align: center;
            margin-bottom: 24px;
            color: #800040;
        }
        form label {
            display: block;
            margin-bottom: 6px;
            font-weight: 500;
            color: #800040;
        }
        form input[type="text"] {
            width: 100%;
            padding: 10px;
            margin-bottom: 16px;
            border: 1px solid #ccc;
            border-radius: 8px;
            box-sizing: border-box;
        }
        form input[type="submit"] {
            width: 100%;
            background-color: #e91e63;
            color: white;
            padding: 12px;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            cursor: pointer;
        }

        input[type="number"] {
       width: 100%;
       padding: 10px;
       margin-top: 5px;
       margin-bottom: 20px;
       border: 1px solid #d889a6;
       border-radius: 10px;
       background-color: #fff0f5;
       transition: border-color 0.3s ease;
   }
    </style>
</head>
<body>
    <div class="container">
    <h1>Ajouter un stock</h1>
   
    <form action="inserer_stock.php" method="POST">
        <label for="flacon_id">ID du Flacon :</label><br>
        <input type="number" name="flacon_id" required><br><br>

        <label for="mag_id">ID du Magasin :</label><br>
        <input type="number" name="mag_id" required><br><br>

        <label for="quantite">Quantité :</label><br>
        <input type="number" name="quantite" min="0" required><br><br>

        <input type="submit" value="Ajouter le stock">
    </form>
    </div>
</body>
</html>
